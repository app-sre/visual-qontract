apiVersion: v1
kind: ConfigMap
metadata:
  name: visual-app-interface-config
  labels:
    app: visual-app-interface
    component: frontend
data:
  # GraphQL API endpoint
  graphql-endpoint: "https://app-interface.production.example.com/graphql"

  # External service URLs - customize these for your environment
  data-dir-url: "https://data.production.example.com"
  docs-dir-url: "https://docs.production.example.com"
  schemas-dir: "https://schemas.production.example.com"
  grafana-url: "https://grafana.production.example.com"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: visual-app-interface-config-staging
  labels:
    app: visual-app-interface
    component: frontend
    environment: staging
data:
  # Staging environment configuration
  graphql-endpoint: "https://app-interface.staging.example.com/graphql"
  data-dir-url: "https://data.staging.example.com"
  docs-dir-url: "https://docs.staging.example.com"
  schemas-dir: "https://schemas.staging.example.com"
  grafana-url: "https://grafana.staging.example.com"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: visual-app-interface-config-dev
  labels:
    app: visual-app-interface
    component: frontend
    environment: development
data:
  # Development environment configuration
  graphql-endpoint: "https://app-interface.dev.example.com/graphql"
  data-dir-url: "https://data.dev.example.com"
  docs-dir-url: "https://docs.dev.example.com"
  schemas-dir: "https://schemas.dev.example.com"
  grafana-url: "https://grafana.dev.example.com"
