# Deployment patches for different environments
# This file contains patches that can be applied to customize the deployment
# for different environments (dev, staging, production)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: visual-app-interface
spec:
  template:
    spec:
      containers:
      - name: visual-app-interface
        # Environment-specific resource limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        # Additional environment variables for production
        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
