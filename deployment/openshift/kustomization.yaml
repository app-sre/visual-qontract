apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: visual-app-interface

resources:
- deployment.yaml
- service.yaml
- route.yaml
- configmap.yaml
- secret.yaml

# Common labels applied to all resources
commonLabels:
  app: visual-app-interface
  version: v1.0.0

# Image configuration
images:
- name: visual-qontract-v2
  newTag: latest

# ConfigMap generator for environment-specific configs
configMapGenerator:
- name: visual-app-interface-env-config
  literals:
  - NODE_ENV=production
  - PORT=8080

# Namespace configuration
namespace: visual-app-interface

# Patches for different environments
patchesStrategicMerge:
- deployment-patches.yaml

# Resource name prefix
namePrefix: vai-
