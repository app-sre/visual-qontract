apiVersion: v1
kind: Secret
metadata:
  name: visual-app-interface-secrets
  labels:
    app: visual-app-interface
    component: frontend
type: Opaque
data:
  # Base64 encoded authorization token
  # Replace this with your actual base64-encoded token
  # Example: echo -n "Bearer your-token-here" | base64
  authorization-token: QmVhcmVyIHlvdXItdG9rZW4taGVyZQ==

---
# Example of how to create the secret using kubectl/oc command:
#
# For production:
# oc create secret generic visual-app-interface-secrets \
#   --from-literal=authorization-token="Bearer your-production-token" \
#   --dry-run=client -o yaml | oc apply -f -
#
# For staging:
# oc create secret generic visual-app-interface-secrets-staging \
#   --from-literal=authorization-token="Bearer your-staging-token" \
#   --dry-run=client -o yaml | oc apply -f -
#
# For development:
# oc create secret generic visual-app-interface-secrets-dev \
#   --from-literal=authorization-token="Bearer your-dev-token" \
#   --dry-run=client -o yaml | oc apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: visual-app-interface-secrets-staging
  labels:
    app: visual-app-interface
    component: frontend
    environment: staging
type: Opaque
data:
  authorization-token: QmVhcmVyIHlvdXItc3RhZ2luZy10b2tlbi1oZXJl

---
apiVersion: v1
kind: Secret
metadata:
  name: visual-app-interface-secrets-dev
  labels:
    app: visual-app-interface
    component: frontend
    environment: development
type: Opaque
data:
  authorization-token: QmVhcmVyIHlvdXItZGV2LXRva2VuLWhlcmU=
